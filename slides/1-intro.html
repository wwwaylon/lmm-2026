**Model frameworks**

&lt;small&gt;

&gt; Multilevel models, Hierarchical linear models (HLM), Mixed-effects models, Linear mixed models (LMM), Growth curve models, Random coefficient models

&lt;/small&gt;

**Model components**

&lt;small&gt;

&gt; Variance components, Random effects / coefficients, Random intercepts and slopes, Varying coefficients, Intercepts- or slopes-as-outcomes, *Cross-level interactions*, *Contextual effects*

👉 **These are all variations of mixed models.**

&lt;/small&gt;

## Why multilevel models? 
  


.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/mlm.png style="width:300px; display:block; margin:-60px auto -30px auto;"&gt;
]

&lt;small&gt;&lt;small&gt;
  
- Data are clustered ➡️ observations are related  

- Standard analyses assume **independence**
  
  **Example: hospital re-admissions**
  
&gt; *Patients in the same hospital share unmeasured factors.*  
&gt; *Repeated measurements on the same patient are not independent.*
  
&lt;/small&gt;&lt;/small&gt;
  
&lt;style="clear: both;"&gt;
  
.center[
&lt;small&gt;&lt;small&gt;
      
.highlight[
**&lt;span style="color:#FFFFFF;"&gt;
Violations of this assumption bias standard errors. 
&lt;/span&gt;**
]
&lt;/small&gt;&lt;/small&gt;
  ]

## 🎯 Estimation in Statistical Models

**How do statistical models estimate parameters?**

&lt;small&gt;&lt;small&gt;

| Model | Outcome | Effects | Sampling |
|------|---------------------|--------|----------------|
| **Linear Model** | **Normal** | **Fixed** | **1 level** |
| &lt;span style="color:#A7A9AC;"&gt;Generalized Linear Model&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;Any&lt;/span&gt;  | &lt;span style="color:#A7A9AC;"&gt;Fixed&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;1 level&lt;/span&gt; |
| &lt;span style="color:#A7A9AC;"&gt;Linear *Mixed* Model&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;Normal&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;Fixed + Random&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;2+ levels&lt;/span&gt; |
| &lt;span style="color:#A7A9AC;"&gt;Generalized Linear *Mixed* Model&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;Any&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;Fixed + Random&lt;/span&gt; | &lt;span style="color:#A7A9AC;"&gt;2+ levels&lt;/span&gt; |

&lt;/small&gt;

**🔑 Key question:**

&gt; How do we estimate the parameters of these models?

We start with Ordinary Least Squares (OLS)

&lt;/small&gt;

---

## 🎯 Estimation in Statistical Models

**Ordinary Least Squares (OLS)**

$$
\color{gray}{\text{Linear regression: }} \text{y}_i = \beta_0 + \beta_1 \text{x}_i + \text{e}_i
$$

$$
\color{gray}{\text{Residual: }} \text{e}_i = \text{y}_i - \hat{\text{y}}_i
$$

$$
\small \color{gray}{\text{OLS chooses coefficients that minimize: }} \sum_{i=1}^{n}(\text{y}_i - \hat{\text{y}}_i)^2
$$

**💡 Core idea**

&gt; Find the line that minimizes the total squared prediction error.

---

## 🎯 Estimation in Statistical Models



.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/ols1_plot.png style="width:400px; display:block; margin:-40px auto -20px auto;"&gt;
]  

&lt;small&gt;

This scatterplot shows the relationship between a predictor **X** and an outcome **Y**. Each orange point represents an observed score.

**OLS will search for the line that best predicts these values.**

&lt;/small&gt;

---

## 🎯 Estimation in Statistical Models

.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/ols2_plot.png style="width:400px; display:block; margin:-40px auto -20px auto;"&gt;
]  

&lt;small&gt;

**Features of the best-fitting line:** &lt;small&gt; Intercept `\(\beta_0\)`, Slope `\(\beta_1\)`, Residual variance &lt;/small&gt;

These parameters define the model that best predicts the data.

&lt;/small&gt;

---

## 🎯 Estimation in Statistical Models

.center[

&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/ols3_plot.png style="width:400px; display:block; margin:-40px auto -20px auto;"&gt;

]  

&lt;small&gt;

A **residual** is the vertical distance to the regression line: `\(\text{e}_i = \text{y}_i - \hat{\text{y}}_i\)`

But OLS does **not minimize the raw residuals**.

---

## 🎯 Estimation in Statistical Models

**Why Square Residuals?**

&lt;small&gt;&lt;small&gt;

| Strategy | Problem |
|----------|---------|
| Minimize **sum** of residuals | Positive &amp; negative cancel |
| Minimize **sum of absolute** residuals | Difficult to solve |
| Minimize **sum of squared** residuals | Works 🏆 ✨ | 

&lt;/small&gt;&lt;/small&gt;

&lt;small&gt;

Key benefits:

✅ makes all values positive

✅ penalizes large errors

✅ produces a **closed-form solution**

&lt;/small&gt;

---

## 🎯 Estimation in Statistical Models

.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/ols4_plot.png style="width:400px; display:block; margin:-40px auto -20px auto;"&gt;
]  

`\(\color{grey}{\text{OLS chooses the line that minimizes: }}\sum_{i=1}^{n}(\text{y}_i - \hat{\text{y}}_i)^2\)`

---



.center[

&lt;img src="img/ols_squares_zoomed.gif" style="display: block; margin: auto;" /&gt;

]  

&lt;small&gt;

Geometrically:

&gt; OLS minimizes the **total area of the residual squares**.

&lt;/small&gt;

---

## 🎯 Estimation in Statistical Models



.center[

&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/ols_boxes_plot.png style="width:300px; display:block; margin:-40px auto -20px auto;"&gt;

]  

&lt;small&gt;

The squared-error function forms a **smooth quadratic surface.**

This means: ✅ there is **one optimal solution** ✅ we can solve it analytically

.center[
.highlight[
**&lt;span style="color:#FFFFFF;"&gt;
OLS therefore has a closed-form estimator.
&lt;/span&gt;**
]
]

&lt;/small&gt;

---

## 🎯 Estimation in Statistical Models

**But What Is OLS Really Doing?**

&lt;small&gt;

&gt; When errors are normally distributed, the OLS estimates of the regression coefficients are identical to the maximum likelihood estimates - minimizing squared residuals and maximizing the normal likelihood are the same problem.

To see why, we need to introduce **Maximum Likelihood (ML)**.

&lt;/small&gt;

---

## 🎯 Estimation in Statistical Models

&lt;style="clear: both;"&gt;

.center[
.highlight[
**&lt;span style="color:#FFFFFF;"&gt;
Maximum Likelihood
&lt;/span&gt;**
]
]

A **probability density function 😏** describes the distribution of the data.

$$ 
\color{grey}{\text{For a normal distribution: }}
\large
\text{L}_i = {\frac{1}{\sqrt{2 \pi \sigma^2}} \text{e}^{-.5\frac{(\color{#EB7B35}{\text{Y}_i - \mu})^2 }{\color{#EB7B35}{\sigma}^2} }} 
$$

`\(\text{L}_i\)` measures the relative probability of observing `\(\text{Y}_i\)` given a mean and variance.

## 🎯 Estimation in Statistical Models

**Why Move Beyond OLS?**
  
OLS works only for:

- Normal outcomes

- One outcome at a time

- Independent observations

- Listwise deletion with missing data

---

## 🎯 Estimation in Statistical Models

**Maximum likelihood allows us to estimate:**

✅ multilevel models

✅ generalized models (binary, count, etc.)

✅ models with missing data (FIML)

✅ multiple outcomes simultaneously

&gt; ML is the general estimation framework for modern statistical models. We will use it!

---

## 🎯 Estimation in Statistical Models

**ML in Multilevel Models**

Multilevel models estimate:

- Fixed effects

- Random effects

- Variance components

These parameters are estimated using **ML** or **REML**.

---

## 🎯 Estimation in Statistical Models

**ML vs. Restricted/Residual ML (REML)**

&lt;small&gt;&lt;small&gt;
  
| Method | Use Case | Pros / Notes |
|--------|----------|--------------|
| **ML** | Comparing models with **different fixed effects** | Random effects estimates may be slightly biased downward |
| **REML** | Comparing models with the **same fixed effects**, or interpreting random effects | Provides unbiased estimates of random effects var/covar&lt;br&gt;&lt;br&gt; Cannot compare models with different fixed effects |

✅ Changing fixed effects? - Use ML to compare

✅ Changing random effects only? - Use REML to compare

✅ Final model for reporting? - Refit with REML for unbiased variance estimates.

&lt;/small&gt;&lt;/small&gt;

## How to handle nested data?

Methods fall into three general categories based on how they handle nestedness.

--

- ⚠️ **Ignore:** disaggregation, aggregation   

- 😕 **Control:** ANCOVA, separate regressions, adjusting the results, fixed effects approach 

- 🔍 **Model:** *Modeling* nestedness     

--

&gt; In fact, methods have shifted from *controlling clustering* (attempting to remove its influence) to **modeling it as something worth studying**! 🙌

## 🙈 🙉 🙊 What is disaggregation?

&gt; Disaggregation means .highlight[**&lt;span style="color:#FFFFFF;"&gt;moving variables to a lower level&lt;/span&gt;**] as if there is no clustering &lt;small&gt;(see [Hox, J., Moerbeek, M., &amp; Van de Schoot, R., 2017](https://biostats.bepress.com/cgi/viewcontent.cgi?article=1001&amp;context=bioconductor)).&lt;/small&gt;

- **The risk:** Inflated sample size and underestimated standard errors (false positives).


---

&lt;small&gt;

- Level-1 units are the unit of analysis.
- Level-1 and level-2 predictors are included as if they were ordinary independent variables.

&lt;/small&gt;

--- 

## 😳 Not recommended

&lt;small&gt;

&gt; .highlight[**&lt;span style="color:#FFFFFF;"&gt;Violates the independence assumption&lt;/span&gt;**] which can lead to standard errors that are severely biased (usually underestimated).   

- **Result:** Inflated Type I error rates and overconfident conclusions.

&gt; .highlight[**&lt;span style="color:#FFFFFF;"&gt;Neglects between-cluster variation&lt;/span&gt;**], effectively treating all clusters as identical and failing to model the unique intercepts or slopes associated with each group.

- **Result:** Lost insights into group-level effects and potentially misleading fixed effects estimates.

&lt;/small&gt;

&lt;small&gt;

The model **&lt;span style="color:#8DC63F;"&gt;overpredicts&lt;/span&gt;** some groups and **&lt;span style="color:#EB7B35;"&gt;underpredicts&lt;/span&gt;** others.

&gt; Residual variance is inflated but the **SE of the slope is too low** because OLS treats all 400 points as independent. Accounting for strong within-group correlation shrinks the effective sample size from 400 to 12! 😲 

$$
\small
\text{SE}(\hat{\beta}) = \sqrt{\frac{\sigma^2 \times \color{#A7A9AC}{\text{VIF}}}{\sum_{i=1}^{n} (x_i - \bar{x})^2}} \text{, where} \color{#A7A9AC}{\text{VIF}} = 1 + (n_j - 1)\rho 
$$
Our estimated SE was **0.006**, but adjusting for groups it should be **0.03**. 

&lt;/small&gt;&lt;/small&gt;

] ]

]

---

## 🔗 What is aggregation?

---

## 🔗 What is aggregation?



.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/aggregation_plot.png style="width:600px; display:block; margin:-40px auto -20px auto;"&gt;
]  

&lt;small&gt;

- Level-2 units are the unit of analysis.
- **Massive loss of information!** 😲    
- The results cannot be generalized to level-1 (*ecological fallacy*).

&lt;/small&gt;

---

## 🔗 What is aggregation?

&lt;small&gt;&lt;small&gt;

**R code:**

&lt;pre style="font-size:0.8em;"&gt;
agg_lm &lt;- lm(y_mean ~ x_mean, data = group_means)
&lt;/pre&gt;


Table: Aggregated Regression (Group Means)

|term        | estimate| std.error| statistic| p.value|
|:-----------|--------:|---------:|---------:|-------:|
|(Intercept) |    6.392|     0.333|     19.20|   0.000|
|x_mean      |   -0.100|     0.015|     -6.43|   0.008|

&gt; In a linear regression predicting **group-mean Y** from the **group-mean X** (both grand mean-centered). The slope for *X* was **-0.1**, which was statistically significant, *t*(3) = -6.43, *p* = 0.008, with a large effect size of `\(\text{R}^2\)` = 0.93. .highlight[**&lt;span style="color:#FFFFFF;"&gt;This analysis is at the group level, and cannot be assumed to apply to individuals within those groups&lt;/span&gt;**].

&lt;/small&gt;&lt;/small&gt;

---

## 🛠 The fixed effects approach?

---

## 🛠 The fixed effects approach?

**Include group as a fixed effect via dummy coding.**

&lt;small&gt;

- Separate intercept for each group

- Slopes equal (unless interactions added)

- Many parameters (50 groups = 49 dummy codes) 😟

&lt;small&gt;

&gt; **Imagine 5 specific hospitals** (Seattle Children's, CHOP, and so on) and we chose these hospitals deliberately because we want to study *these* hospitals specifically. Our estimates tell us how much each hospital's intercept differs from **the reference hospital**, and .highlight[**&lt;span style="color:#FFFFFF;"&gt;we never intend to say anything beyond these 5 hospitals anyway&lt;/span&gt;**]. Because slopes are fixed (parallel lines), the effect of *X* represents the common within-hospital relationship across all hospitals.

&lt;/small&gt;&lt;/small&gt; 

---

## 🛠 The fixed effects approach?

&lt;small&gt;&lt;small&gt;

**R code:**

&lt;pre style="font-size:0.8em;"&gt;
fixed_lm &lt;- lm(y ~ x + factor(group), data = df)
&lt;/pre&gt;


Table: Fixed-effects Regression (dummy codes)

|term           | estimate| std.error| statistic| p.value|
|:--------------|--------:|---------:|---------:|-------:|
|(Intercept)    |      8.1|     0.211|      38.4|       0|
|x              |      0.1|     0.004|      23.6|       0|
|factor(group)2 |     -2.9|     0.307|      -9.4|       0|
|factor(group)3 |     -6.4|     0.327|     -19.5|       0|
|factor(group)4 |     -9.4|     0.363|     -25.8|       0|
|factor(group)5 |    -12.2|     0.395|     -30.9|       0|

This approach absorbs between-group variation and focuses on within-group associations, producing more realistic SEs than naive pooled OLS.

&lt;/small&gt;&lt;/small&gt;

---

## 🛠 The fixed effects approach?

**1️⃣ No bias from omitted group effects**

&lt;small&gt;

- The over/under-prediction problem from pooled OLS goes away because each group gets its own intercept.

&lt;/small&gt;

**2️⃣ No design-effect inflation from clustering**

&lt;small&gt;

- The ICC is controlled by the group terms 

&lt;/small&gt;

**3️⃣ Effective sample size is 396 after adjustment.** 

&lt;small&gt;

.center[

*Assumes fixed slopes unless you add interactions.* 

]

&lt;/small&gt;

---

## 📊 ANCOVA approach?

---

## 📊 ANCOVA approach?



.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/ancova_plot.png style="width:600px; display:block; margin:-40px auto -20px auto;"&gt;
]  

&lt;small&gt;

**Same model - different interpretation and motivation.**

&lt;small&gt;

- Cannot model varying slopes across groups  
- Cannot include level-2 predictors of group effects  
- Group differences are controlled, not modeled

&lt;/small&gt;&lt;/small&gt;

---

## 🧩 Post-adjustment?

---

## 🧩 Post-adjustment?

**If nesting biases standard errors, adjust them directly.**

&lt;small&gt;&lt;small&gt;

**R code:**

&lt;pre style="font-size:0.8em;"&gt;
pooled_lm &lt;- lm(y ~ x_c, data = df)
cluster_se &lt;- sandwich::vcovCL(pooled_lm, cluster = df$group, type = "HC1")
&lt;/pre&gt;


Table: Fixed-effects Regression with Cluster-Robust SEs

|term        | estimate| std.error| t_value| p_value|
|:-----------|--------:|---------:|-------:|-------:|
|(Intercept) |    6.392|     1.115|    5.73|   0.000|
|x_c         |    0.001|     0.024|    0.02|   0.982|

- The new SE = **0.02** up from **0.006**

- Does **not model cluster-specific effects** 

- Generally **not recommended** for multilevel data

&lt;/small&gt;&lt;/small&gt;

---

## 🔀 Separate regressions? 

---

## 🔀 Separate regressions?



.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/seperate_plot.png style="width:600px; display:block; margin:-40px auto -20px auto;"&gt;
] 

**Analyze each level-2 unit separately.**

- 5 groups = 5 models

---

.center[
## 🔀 Seperate regressions?

&lt;small&gt;

**5 separate regressions ➡️ get the variance across groups** 

]

&lt;small&gt;



.pull-left-45[


Table: Separate Regressions per Group: Intercepts and Slopes

|group | intercept| slope|
|:-----|---------:|-----:|
|1     |      7.98|  0.11|
|2     |      5.76|  0.09|
|3     |      1.27|  0.11|
|4     |     -1.70|  0.11|
|5     |     -3.27|  0.09|

]

.pull-right-45[


Table: Variance and Covariance Across Groups (equal weight)

|  I_Var|   S_Var| IS_Cov|
|------:|-------:|------:|
| 22.995| 0.00017|  0.007|

]

&lt;/small&gt;&lt;/small&gt;

---

## 🔀 Separate regressions?

- Examine variance of intercepts &amp; slopes

- All clusters are weighted equally  

- Does **not partition variance** 

- Involves estimating a **large number of parameters!** 

&gt; 50 hospitals = 50 separate regressions = 500 parameters - this requires a ton of data! 😔 

---

## 🤨 Which Effect Is Correct?



.center[

&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/paradox_plot.png style="width:600px; display:block; margin:-40px auto -20px auto;"&gt;

]  

&lt;small&gt;

**What happens with the same data can be confusing.** 

&gt; Ignoring clustering changes the estimated relationship.

&lt;style="clear: both;"&gt;

.center[
.highlight[
**&lt;span style="color:#FFFFFF;"&gt;
We need a model that separates within- and between-group effects.
&lt;/span&gt;**
]
]

&lt;/small&gt;

---

## &lt;img src="C:/Users/whowar/Desktop/lmm-2026/slides/img/cfa_icon_emoji.png"style="width:60px; display:inline-block; margin-left:-10px; vertical-align:-12px;"&gt;  The Solution: Multilevel Models

---

## &lt;img src="C:/Users/whowar/Desktop/lmm-2026/slides/img/cfa_icon_emoji.png"style="width:60px; display:inline-block; margin-left:-10px; vertical-align:-12px;"&gt;  The Solution: Multilevel Models



.center[
&lt;img src=C:/Users/whowar/Desktop/lmm-2026/slides/img/mlm_plot.png style="width:600px; display:block; margin:-40px auto -20px auto;"&gt;
]  

&lt;small&gt;

.center[
**Multilevel models do something different:**  
they *simultaneously* model variation **within** and **between** clusters.
]

&lt;/small&gt;

---

## &lt;img src="C:/Users/whowar/Desktop/lmm-2026/slides/img/cfa_icon_emoji.png"style="width:60px; display:inline-block; margin-left:-10px; vertical-align:-12px;"&gt;  The Solution: Multilevel Models

&lt;small&gt;

**Model the structure - don't ignore it, don't destroy it.**

*All the approaches so far fall short in some way:*

- **Disaggregation:** &lt;small&gt;Easy but biased; treats all observations as exchangeable&lt;/small&gt;  

- **Aggregation:** &lt;small&gt;Only higher level data; different questions&lt;/small&gt;

- **Dummy codes:** &lt;small&gt;Assumes *one* shared story across clusters, unwieldy&lt;/small&gt;

- **Post-adjustment:** &lt;small&gt;Corrects bias but ignores cluster variation&lt;/small&gt;   

- **Separate regressions:** &lt;small&gt;Parameter-hungry and can't generalize&lt;/small&gt;  

&lt;/small&gt;

---

## &lt;img src="C:/Users/whowar/Desktop/lmm-2026/slides/img/cfa_icon_emoji.png"style="width:60px; display:inline-block; margin-left:-10px; vertical-align:-12px;"&gt;  The Solution: Multilevel Models

&lt;small&gt;

**Model dependency across observations** 

&lt;small&gt;

  - Longitudinal, clustered, or cross-classified data? ✅ No problem!  

  - Tailor your model to the **sources of correlation** in your data

&lt;/small&gt;

**Include categorical or continuous predictors at any level**  

&lt;small&gt;

  - Time-varying, person-level, or group-level predictors   

  - Explore **why** observations are correlated, don’t just control for it

&lt;/small&gt;

**Handle unbalanced or missing data**  

&lt;small&gt;

  - Not every person needs the same number of measurements  

  - Missing data? ✅ No problem!

&lt;/small&gt;

&lt;/small&gt;

---
