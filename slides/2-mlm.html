&lt;small&gt;

&gt; **Can clinic-level characteristics predict patient pain?**

&lt;/small&gt;

.pull-left-50[
.center[
.highlight[**&lt;span style="color:#FFFFFF;"&gt;1-level Intercept Only&lt;/span&gt;**]

`$$y_i = \beta_0 + \text{e}_i$$`

**ONE** source of variance:
`$$\text{e}_{i} \sim N(0, \sigma_\text{e}^2)$$`
&lt;br&gt;
&lt;small&gt;
*i* = level 1, &lt;span style="color:#EB7B35;"&gt;*j*&lt;/span&gt; = level 2
&lt;/small&gt;
]
]
.pull-right-50[
.center[
.highlight[**&lt;span style="color:#FFFFFF;"&gt;2-level Intercept Only&lt;/span&gt;**]

`$$\text{Level 1: } y_{i\color{#EB7B35}{j}} = \beta_{0\color{#EB7B35}{j}} + \text{e}_{i\color{#EB7B35}{j}}$$`
`$$\text{Level 2: } \beta_{0\color{#EB7B35}{j}} = \gamma_{00} + u_{0\color{#EB7B35}{j}}$$`
**TWO** sources of variance:
`$$\text{e}_{ij} \sim N(0, \sigma_\text{e}^2)$$`
`$$u_{0j} \sim N(0, \tau_{00})$$`
]
]

## 📊 Intraclass Correlation (ICC)

**What is the ICC?**

`$$\text{ICC} = \frac{\tau_{00}}{\tau_{00} + \sigma_\text{e}^2} = \frac{16.272}{16.272 + 41.29} = 0.283$$`

**Three Interpretations**  

&lt;small&gt;&lt;small&gt;

- **Proportion:** 28.3% of variance in pain is **between clinics**

- **Correlation:** Patients from the same clinic correlate at **r = 0.283**

- **Effect Size:** Large clustering effect

&lt;/small&gt;

&gt; ⚠️ No ICC value is “safe” to ignore.

&lt;/small&gt;



---

## ⚡ Design Effect

**Clustering inflates variance (less info than you think)**

$$
\small
\text{DEFF} = 1 + (\bar{n} - 1) \times \text{ICC}
$$
$$
\small
= 1 + (19.7 - 1) \times 0.283 = 6.28
$$

**⚠️ Effective Sample Size**

$$
\small
N_{\text{eff}} = \frac{N}{\text{DEFF}} = \frac{492}{6.28} \approx 78
$$

---

## 🤔 Likelihood Ratio Test 

**Hypothesis:** 

`\(\small H_0: \tau_{00} = 0 \space \color{gray}{\text{(no clustering)}} \quad \quad H_1: \tau_{00} &gt; 0 \space \color{gray}{\text{(clustering exists)}}\)`

**Result:** 

`\(\small -2 \Delta \text{LL} (df = 1) = 108.13 \text{, p } &lt; .001\)`

&lt;style="clear: both;"&gt;

.center[
.highlight[
**&lt;span style="color:#FFFFFF;"&gt;
Model improves!
&lt;/span&gt;**
]
]

**R code:**
&lt;pre style="font-size:0.7em;"&gt;
lrt_stat &lt;- -2 * (logLik(Model0) - logLik(Model1))
p_value &lt;- pchisq(lrt_stat, df = 1, lower.tail = FALSE)
&lt;/pre&gt;
